project:
  root: "/home/ubuntu/xiangmu/xiaofang/chap_2"
  framework_root: "/home/ubuntu/xiangmu/xiaofang/chap_2/deeplearning/framework"

data:
  raw_root: "/home/ubuntu/xiangmu/xiaofang/chap_2/data"
  metadata_csv: "/home/ubuntu/xiangmu/xiaofang/chap_2/new_analysis/outputs/metadata/trials.csv"
  biomarker_package_zip: "/home/ubuntu/xiangmu/xiaofang/chap_2/l2_ligit/biomarker_plus4_logreg_package.zip"
  tabular_sources:
    core_features: "/home/ubuntu/xiangmu/xiaofang/chap_2/new_analysis/outputs/features/core_features.csv"
    mechanics_features: "/home/ubuntu/xiangmu/xiaofang/chap_2/xiazhijigu/outputs/features/joint_features.csv"
    synergy_features: "/home/ubuntu/xiangmu/xiaofang/chap_2/jirouxietong/outputs/features/synergy_features.csv"
  outputs_root: "/home/ubuntu/xiangmu/xiaofang/chap_2/deeplearning/framework/150epoch/outputs"
  stale_prefixes:
    - "/home/Data1/myProjects/xiaofang/chap_2/data"
  keep_actions: ["SSC", "VDJ"]
  require_complete_files: true
  filter_no_landing: true

signals:
  grf_threshold: 20.0
  pre_window_ms: 100
  post_window_ms: 200
  target_points: 101
  emg_bandpass_hz: [20, 450]
  emg_lowpass_hz: 6
  emg_envelope_window_ms: 50
  emg_channels:
    - "BICEPS FEM."
    - "VMO"
    - "VLO"
    - "MED. GASTRO"
    - "LAT. GASTRO"
    - "SEMITEND."
    - "TIB.ANT."
    - "RECTUS FEM."
  ik_channels:
    - "hip_flexion_r"
    - "knee_angle_r"
    - "ankle_angle_r"
  id_channels:
    - "hip_flexion_r_moment"
    - "knee_angle_r_moment"
    - "ankle_angle_r_moment"
  grf_channels:
    - "total_grf_vx"
    - "total_grf_vy"
    - "total_grf_vz"

splits:
  method: "stratified_group_kfold"
  n_splits: 5
  group_column: "subject_id"
  label_column: "injury_label"
  action_column: "action"
  random_seed: 42

training:
  batch_size: 8
  num_workers: 0
  max_epochs: 80
  learning_rate: 0.0003
  weight_decay: 0.0001
  early_stop_patience: 12
  positive_class_weight: 1.0
  monitor_metric: "auprc"
  decision_threshold: 0.5
  min_epochs: 20
  device: "auto"
  preload_dataset: true
  use_weighted_sampler: true
  loss:
    name: "cb_focal"
    gamma: 1.5
    alpha: "auto"
    cb_beta: 0.995
  subject_paired_aux:
    enabled: false
    raw_cls_weight: 0.0
    biomarker_cls_weight: 0.0
    biomarker_aux_weight: 0.2
    biomarker_aux_delta: 1.0
    ranking_weight: 0.0
    ranking_margin: 0.25
    hard_negative_weight: 0.0
    hard_negative_margin: 0.0
    hard_negative_topk: 2
    hard_negative_warmup_epochs: 8
    ssc_negative_weight: 0.0
    ssc_negative_margin: 0.0
    ssc_negative_warmup_epochs: 8

threshold_tuning:
  enabled: true
  primary_strategy: "f1"
  strategies: ["f1", "youden"]
  min_threshold: 0.05
  max_threshold: 0.95
  num_thresholds: 181

biomarker_mlp_nested:
  inner_splits: 4
  primary_strategy: "accuracy"
  strategies: ["accuracy", "balanced_accuracy", "f1", "youden"]
  calibration_enabled: true
  calibration_c: 1.0
  positive_class_weight: 1.0
  use_weighted_sampler: true
  ensemble_size: 10
  ensemble_seed_stride: 10000
  final_epoch_aggregation: "median"
  min_final_epochs: 150
  max_final_epochs: 150

threshold_bagging:
  source_prefix: "biomarker_mlp_nested_bce_calibrated_ensemble10"
  report_prefix: "biomarker_mlp_nested_bce_calibrated_ensemble10_threshold_bagging"
  objectives: ["accuracy"]
  aggregations:
    median: 0.50
    q65: 0.65
    q75: 0.75
  n_bootstrap: 1000
  random_seed: 20260513
  top_features: 5
  neighbor_k: 5
  boundary_margin: 0.02

biomarker_feature_select:
  top_k_values: [20, 30, 40]
  anchor_current_biomarkers: true
  max_missing_rate: 0.3
  min_std: 0.00000001
  selection_repeats: 100
  selection_train_fraction: 0.8
  selection_top_n_per_repeat: 80
  corr_threshold: 0.9
  k_selection_inner_splits: 4
  k_selection_metric: "f1"
  k_selection_logreg_c: 0.03
  inner_splits: 4
  primary_strategy: "accuracy"
  strategies: ["accuracy", "balanced_accuracy", "f1", "youden"]
  calibration_enabled: true
  calibration_c: 1.0
  positive_class_weight: 1.0
  use_weighted_sampler: true
  ensemble_size: 10
  ensemble_seed_stride: 10000
  final_epoch_aggregation: "median"
  min_final_epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  model_type: "biomarker_mlp"
  model:
    hidden_dims: [32, 16]
    dropout: 0.15
    residual_scale: 0.35

model:
  baseline:
    name: "logistic_regression"
  biomarker_mlp:
    name: "biomarker_mlp"
    hidden_dims: [64, 32]
    dropout: 0.2
  sequence:
    name: "multimodal_cnn"
    emg_hidden: 64
    mech_hidden: 64
    tabular_hidden: 32
    fusion_hidden: 128
    dropout: 0.2
    action_embedding_dim: 4
  subject_paired:
    name: "paired_raw_biomarker_aux"
    variant: "biomarker_aux"
    report_tag: "biomarker_aux"
    subject_hidden: 128
    fusion_hidden: 160
    biomarker_hidden: 48
    biomarker_aux_hidden: 64
    dropout: 0.2

diffusion:
  enabled: false
  role: "latent_augmentation"
  latent_dim: 64
  timesteps: 200
  guidance: "label_action_conditioned"

evaluation:
  metrics:
    - "auroc"
    - "auprc"
    - "accuracy"
    - "sensitivity"
    - "specificity"
    - "f1"
